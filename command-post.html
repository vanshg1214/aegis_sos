<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aegis — Centro de mando</title>
<style>
  :root{
    --night:#0C0C0C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:#fff;
    min-height:100vh;
    padding:24px;
  }
  .wrap{max-width:520px;margin:0 auto}
  h1{font-size:20px;font-weight:800;color:#14262B;margin-bottom:18px}

  .bar{
    display:flex;align-items:center;gap:16px;
    border-radius:20px;padding:20px 24px;margin-bottom:16px;
    color:#fff;width:100%;text-align:left;border:none;
    box-shadow:0 4px 10px rgba(0,0,0,0.12);
    text-decoration:none;
    cursor:pointer;transition:transform .1s;
  }
  .bar:active{transform:scale(.98)}
  .icon{
    width:64px;height:64px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:32px;flex-shrink:0;
    background:rgba(255,255,255,0.18);
  }
  .title{font-size:22px;font-weight:700;margin:0 0 4px 0}
  .subtitle{font-size:15px;margin:0;opacity:0.9;font-weight:400}

  .red{background:linear-gradient(135deg,#e02b26,#7a0f0f)}
  .green{background:linear-gradient(135deg,#1f7a5c,#12503c)}
  .orange{background:linear-gradient(135deg,#c98a1e,#8a5d10)}

  /* ---------- Registro overlay ---------- */
  #citaOverlay{display:none;position:fixed;inset:0;background:#fff;z-index:999;overflow-y:auto}
  .reg-wrap{max-width:480px;margin:0 auto;padding:70px 22px 60px}
  .reg-close{position:fixed;top:16px;right:16px;z-index:1000;width:38px;height:38px;border-radius:12px;
    background:#F2F4F3;border:none;color:#14262B;font-size:18px}
  .reg-h1{font-size:24px;font-weight:800;color:#14262B;margin-bottom:4px}
  .reg-sub{font-size:14px;color:#5C7079;margin-bottom:22px}
  .reg-step{font-size:12px;font-weight:800;color:#1f7a5c;letter-spacing:.04em;margin:20px 0 10px;text-transform:uppercase}
  .reg-section{background:#F7FAF9;border:1.5px solid #E2E9E7;border-radius:16px;padding:16px 16px 8px;margin-bottom:14px}
  .reg-section h3{font-size:13px;color:#1f7a5c;margin-bottom:10px}
  .rfield{margin-bottom:12px}
  .rfield label{display:block;font-size:12.5px;font-weight:700;color:#14262B;margin-bottom:5px}
  .rfield input, .rfield textarea, .rfield select{
    width:100%;background:#fff;border:1.5px solid #D7E0DD;color:#14262B;
    padding:11px 12px;border-radius:10px;font-size:13.5px;font-family:inherit}
  .rfield textarea{resize:vertical;min-height:56px}
  .rfield .hint{font-size:11px;color:#c0392b;margin-top:4px;display:none}
  .rfield.err input, .rfield.err textarea, .rfield.err select{border-color:#c0392b}
  .rfield.err .hint{display:block}
  .rrow{display:flex;gap:10px}
  .rrow .rfield{flex:1}
  .raddpet{width:100%;background:none;border:1.5px dashed #B9C7C3;color:#1f7a5c;border-radius:12px;
    padding:11px;font-size:12.5px;font-weight:700;margin-bottom:16px}
  .rchk{display:flex;gap:10px;align-items:flex-start;margin:14px 0 4px}
  .rchk input{margin-top:3px}
  .rchk label{font-size:12px;line-height:1.5;color:#3A4A4E}
  .rbtnrow{display:flex;gap:10px;margin-top:18px}
  .rbtn{flex:1;text-align:center;padding:14px;border-radius:12px;font-weight:800;font-size:13.5px;border:none}
  .rbtn.primary{background:linear-gradient(120deg,#1f7a5c,#12503c);color:#fff}
  .rbtn.ghost{background:#F2F4F3;color:#14262B}
  .reg-vetcard{background:#F7FAF9;border:1.5px solid #E2E9E7;border-radius:16px;padding:16px;margin-bottom:14px}
  .reg-vetcard .cn{font-weight:800;font-size:15px;color:#14262B;margin-bottom:2px}
  .reg-vetcard .cm{font-size:12px;color:#5C7079;margin-bottom:12px}
  .reg-vetacts{display:flex;gap:8px}
  .reg-vetacts a{flex:1;text-align:center;font-weight:700;font-size:12.5px;padding:11px;border-radius:11px;
    text-decoration:none;color:#fff}
  .reg-vetacts .call{background:#e02b26}
  .reg-vetacts .wa{background:#1FA855}
  .reg-edit{width:100%;background:none;border:none;color:#5C7079;font-size:12px;text-align:center;
    padding:10px;text-decoration:underline}

  /* ---------- Store overlay ---------- */
  #storeOverlay{display:none;position:fixed;inset:0;background:#fff;z-index:999;overflow-y:auto}
  .store-wrap{max-width:520px;margin:0 auto;padding:70px 18px 100px}
  .store-close{position:fixed;top:16px;right:16px;z-index:1000;width:38px;height:38px;border-radius:12px;
    background:#F2F4F3;border:none;color:#14262B;font-size:18px}
  .store-h1{font-size:22px;font-weight:800;color:#14262B;text-align:center;margin-bottom:14px}
  .store-logo{display:block;max-width:170px;height:auto;margin:0 auto 6px}

  /* ---------- Cover screen ---------- */
  .covers{display:flex;flex-wrap:wrap;gap:14px;margin:18px 0 16px}
  .bookcover{flex:0 0 calc(50% - 7px);aspect-ratio:3/4;border-radius:10px;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:#fff;text-align:center;padding:16px;position:relative;
    box-shadow:0 6px 16px rgba(0,0,0,.18), inset 0 0 0 1px rgba(255,255,255,.15);
    background:linear-gradient(160deg,#2E9E8F,#14262B 120%)}
  .bookcover.gato{background:linear-gradient(160deg,#8a5d10,#3A2A05 120%)}
  .bookcover::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:3px;
    background:rgba(255,255,255,.25);border-radius:2px}
  .bookcover .cover-icon{font-size:42px}
  .bookcover .cover-title{font-family:'Bricolage Grotesque',serif;font-weight:800;font-size:17px;line-height:1.25}
  .bookcover .cover-sub{font-size:10.5px;opacity:.85;letter-spacing:.04em;text-transform:uppercase}
  .accessories-link{display:block;width:100%;text-align:center;background:none;border:none;
    color:#5C7079;font-size:13px;text-decoration:underline;padding:8px}
  .back-link{background:none;border:none;color:#8a5d10;font-weight:700;font-size:13px;margin-bottom:12px}

  /* ---------- Flipbook ---------- */
  .book-page{background:#F7FAF9;border:1.5px solid #E2E9E7;border-radius:16px;padding:22px 18px;
    min-height:280px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .book-page .bp-pic{font-size:56px;margin-bottom:10px}
  .book-page .bp-title{font-family:'Bricolage Grotesque',serif;font-weight:800;font-size:19px;color:#14262B;margin-bottom:4px}
  .book-page .bp-desc{font-size:13px;color:#5C7079;margin-bottom:14px}
  .book-page .bp-price{font-size:18px;font-weight:800;color:#8a5d10;margin-bottom:14px}
  .book-page .bp-actions{display:flex;flex-direction:column;gap:8px;width:100%;max-width:220px}
  .book-page .bp-actions button{padding:11px;border-radius:10px;font-weight:700;font-size:13px}
  .book-page .bp-add{background:linear-gradient(120deg,#c98a1e,#8a5d10);color:#fff;border:none}
  .book-page .bp-info{background:none;border:1.5px solid #E2E9E7;color:#5C7079}
  .book-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
  .book-nav button{width:44px;height:44px;border-radius:50%;background:#F2F4F3;font-size:20px;font-weight:800;color:#14262B}
  .book-nav button:disabled{opacity:.3}
  .book-nav span{font-size:12.5px;color:#5C7079;font-weight:700}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;text-align:center;padding:10px;border-radius:12px;font-weight:700;font-size:13px;
    background:#F2F4F3;border:1.5px solid #E2E9E7;color:#14262B}
  .tab.sel{background:linear-gradient(120deg,#c98a1e,#8a5d10);color:#fff;border-color:transparent}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .scard{background:#F7FAF9;border:1.5px solid #E2E9E7;border-radius:16px;padding:14px;display:flex;flex-direction:column}
  .scard .pic{font-size:34px;text-align:center;margin-bottom:8px}
  .scard .name{font-size:13px;font-weight:700;margin-bottom:2px;color:#14262B}
  .scard .desc{font-size:11px;color:#5C7079;margin-bottom:8px;line-height:1.4;flex:1}
  .scard .price{font-size:14.5px;font-weight:800;color:#8a5d10;margin-bottom:10px}
  .scard button{width:100%;background:linear-gradient(120deg,#c98a1e,#8a5d10);color:#fff;border:none;
    border-radius:10px;padding:10px;font-weight:700;font-size:12px}
  .scard button.added{background:#1FA855}
  .storecartbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid #E2E9E7;
    padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:1000}
  .storecartbar .info{font-size:13px;color:#14262B}
  .storecartbar .info b{display:block;font-size:16px;color:#8a5d10}
  .storecartbar button{background:linear-gradient(120deg,#c98a1e,#8a5d10);color:#fff;border:none;
    border-radius:12px;padding:12px 18px;font-weight:800;font-size:13px;white-space:nowrap}
  .storecartbar button:disabled{opacity:.4}
  .store-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1001}
  .store-sheet{display:none;position:fixed;left:0;right:0;bottom:0;background:#fff;
    border-radius:20px 20px 0 0;padding:20px 18px 24px;z-index:1002;max-height:75vh;overflow-y:auto}
  .store-sheet h2{font-size:17px;margin-bottom:14px;color:#14262B}
  .srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
    border-bottom:1px solid #E2E9E7;font-size:13px;color:#14262B}
  .srow .rm{color:#e02b26;font-size:12px;background:none;border:none;font-weight:700}
  .stotal{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-top:14px;color:#14262B}
  .scheckout{width:100%;margin-top:16px;background:#1FA855;color:#fff;border:none;border-radius:12px;
    padding:14px;font-weight:800;font-size:14px}
  .sclose{width:100%;background:none;border:none;color:#5C7079;font-size:12.5px;padding:12px;text-decoration:underline}

  .storetop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .admin-link{background:none;border:none;color:#8a5d10;font-size:12px;font-weight:700;text-decoration:underline}
  .scard .info-btn{width:100%;background:none;border:1.5px solid #E2E9E7;color:#5C7079;border-radius:10px;
    padding:6px;font-size:11px;font-weight:700;margin-top:6px}

  .nutri-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1001}
  .nutri-sheet{display:none;position:fixed;left:0;right:0;bottom:0;background:#fff;
    border-radius:20px 20px 0 0;padding:20px 18px 24px;z-index:1002;max-height:80vh;overflow-y:auto;color:#14262B}
  .nutri-sheet h2{font-size:17px;margin-bottom:4px}
  .nutri-sheet .sub{font-size:12px;color:#5C7079;margin-bottom:14px}
  .nutri-sheet h4{font-size:12.5px;color:#8a5d10;margin:14px 0 6px}
  .nutri-sheet p{font-size:13px;line-height:1.5;color:#3A4A4E}
  .nutri-table{width:100%;border-collapse:collapse;font-size:13px}
  .nutri-table td{padding:6px 0;border-bottom:1px solid #E2E9E7}
  .nutri-table td:last-child{text-align:right;font-weight:700}
  .nutri-placeholder{background:#FFF6E5;border:1.5px dashed #E0B15C;border-radius:12px;padding:12px;
    font-size:12px;color:#8a5d10;margin-top:10px}

  .admin-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:1003;overflow-y:auto}
  .admin-wrap{max-width:520px;margin:0 auto;padding:70px 18px 100px;color:#14262B}
  .admin-close, .supplier-close{position:fixed;top:16px;right:16px;z-index:1004;width:38px;height:38px;border-radius:12px;
    background:#F2F4F3;border:none;color:#14262B;font-size:18px}
  .admin-h1{font-size:20px;font-weight:800;margin-bottom:16px}
  .aitem, .supitem{background:#F7FAF9;border:1.5px solid #E2E9E7;border-radius:14px;padding:14px;margin-bottom:12px}
  .aitem .arow{display:flex;gap:8px;margin-bottom:8px}
  .aitem .arow input, .aitem .arow select, .aitem textarea{
    width:100%;background:#fff;border:1.5px solid #D7E0DD;border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:inherit}
  .aitem label{font-size:11px;font-weight:700;color:#5C7079;display:block;margin-bottom:3px}
  .aitem .col{flex:1}
  .adel{background:none;border:none;color:#e02b26;font-size:11.5px;font-weight:700;margin-top:6px}
  .aadd{width:100%;background:none;border:1.5px dashed #B9C7C3;color:#8a5d10;border-radius:12px;
    padding:12px;font-size:13px;font-weight:700;margin:6px 0 18px}
  .asave{width:100%;background:linear-gradient(120deg,#c98a1e,#8a5d10);color:#fff;border:none;
    border-radius:12px;padding:14px;font-weight:800;font-size:14px}
  .asaved-msg{text-align:center;font-size:12.5px;color:#1FA855;font-weight:700;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="wrap">

  <button class="bar red" onclick="summonEmergencia()">
    <div class="icon">🚨</div>
    <div>
      <p class="title">Emergencia ahora</p>
      <p class="subtitle">Ayuda las 24 horas</p>
    </div>
  </button>

  <button class="bar green" onclick="summonRegistro()">
    <div class="icon">📅</div>
    <div>
      <p class="title">Solicitar cita</p>
      <p class="subtitle">Visita no urgente</p>
    </div>
  </button>

  <button class="bar orange" onclick="summonStore()">
    <div class="icon">🍗</div>
    <div>
      <p class="title">Pedir alimento</p>
      <p class="subtitle">Recomendado para tu mascota</p>
    </div>
  </button>

</div>

<script>
function summonEmergencia(){
  var frame = document.getElementById('emergFrame');
  if(!frame.dataset.loaded){
    var b64 = document.getElementById('emergSource').textContent;
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++){ bytes[i] = binary.charCodeAt(i); }
    var html = new TextDecoder('utf-8').decode(bytes);
    frame.srcdoc = html;
    frame.dataset.loaded = '1';
  }
  document.getElementById('emergOverlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}
function closeEmergencia(){
  document.getElementById('emergOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

// ================= Registro de Emergencia (cita) =================
let regPets = 1;
let regDraft = {mascotas:[]};
let regP1 = {};

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function captureRegDraft(){
  const g = id => { const el=document.getElementById(id); return el ? el.value : undefined; };
  if(document.getElementById('regNombre')){
    regDraft.nombreCompleto = g('regNombre');
    regDraft.direccion = g('regDireccion');
    regDraft.barrio = g('regBarrio');
    regDraft.telefono = g('regTelefono');
    regDraft.email = g('regEmail');
    regDraft.whatsapp = g('regWhatsapp');
    const mascotas = [];
    for(let i=1;i<=regPets;i++){
      if(!document.getElementById('regPetNombre'+i)) break;
      mascotas.push({
        nombre: g('regPetNombre'+i), raza: g('regPetRaza'+i), peso: g('regPetPeso'+i),
        genero: g('regPetGenero'+i), edad: g('regPetEdad'+i), fechaNacimiento: g('regPetFecha'+i)
      });
    }
    regDraft.mascotas = mascotas;
  }
}
function regAddPet(){
  captureRegDraft();
  regPets++;
  regDraft.mascotas[regPets-1] = regDraft.mascotas[regPets-1] || {};
  renderRegPaso1();
}

function summonRegistro(){
  document.body.style.overflow = 'hidden';
  document.getElementById('citaOverlay').style.display = 'block';
  const saved = localStorage.getItem('aegisPetRecord');
  if(saved){
    const record = JSON.parse(saved);
    renderRegVetCard(record);
  } else {
    renderRegPaso1();
  }
  window.scrollTo({top:0});
}
function closeRegistro(){

function regGoPaso2(){
  const nombre = document.getElementById('regNombre').value.trim();
  const tel = document.getElementById('regTelefono').value.trim();
  let ok = true;
  regToggleErr('rf-nombre', !nombre); if(!nombre) ok=false;
  regToggleErr('rf-telefono', !tel); if(!tel) ok=false;
  if(!ok) return;

  regP1 = {
    nombreCompleto: nombre,
    direccion: document.getElementById('regDireccion').value.trim(),
    barrio: document.getElementById('regBarrio').value.trim(),
    telefono: tel,
    email: document.getElementById('regEmail').value.trim(),
    whatsapp: document.getElementById('regWhatsapp').value.trim(),
    mascotas: []
  };
  for(let i=1;i<=regPets;i++){
    regP1.mascotas.push({
      nombre: document.getElementById('regPetNombre'+i).value.trim(),
      raza: document.getElementById('regPetRaza'+i).value.trim(),
      peso: document.getElementById('regPetPeso'+i).value.trim(),
      genero: document.getElementById('regPetGenero'+i).value,
      edad: document.getElementById('regPetEdad'+i).value.trim(),
      fechaNacimiento: document.getElementById('regPetFecha'+i).value.trim()
    });
  }
  renderRegPaso2();
  window.scrollTo({top:0});
}

function regSubmit(){
  const req = {
    'rf-marca': document.getElementById('regMarca').value.trim(),
    'rf-donde': document.getElementById('regDonde').value.trim(),
    'rf-salud': document.getElementById('regSalud').value.trim(),
    'rf-medic': document.getElementById('regMedic').value.trim(),
    'rf-vetNombre': document.getElementById('regVetNombre').value.trim(),
    'rf-vetDireccion': document.getElementById('regVetDireccion').value.trim(),
    'rf-vetTelefono': document.getElementById('regVetTelefono').value.trim(),
  };
  let ok = true;
  for(const id in req){ const bad = !req[id]; regToggleErr(id, bad); if(bad) ok=false; }
  const authed = document.getElementById('regAuth').checked;
  document.getElementById('regAuthHint').style.display = authed ? 'none' : 'block';
  if(!authed) ok = false;
  if(!ok) return;

  const record = Object.assign({}, regP1, {
    foodMarca: req['rf-marca'], foodDonde: req['rf-donde'],
    saludProblemas: req['rf-salud'], saludMedicamentos: req['rf-medic'],
    vetNombre: req['rf-vetNombre'], vetDireccion: req['rf-vetDireccion'], vetTelefono: req['rf-vetTelefono']
  });
  localStorage.setItem('aegisPetRecord', JSON.stringify(record));
  renderRegVetCard(record);
  window.scrollTo({top:0});
}

function regEdit(){
  const saved = JSON.parse(localStorage.getItem('aegisPetRecord')||'{}');
  regDraft = saved;
  regPets = (saved.mascotas||[{}]).length || 1;
  renderRegPaso1();
}

function renderRegVetCard(record){
  const telDigits = (record.vetTelefono||'').replace(/[^0-9]/g,'');
  document.getElementById('regContent').innerHTML = `
    ${regHeader()}
    <div class="reg-section">
      <h3>Listo para pedir cita</h3>
      <p style="font-size:13px;color:#3A4A4E;line-height:1.5">Aquí están los datos de ${esc(record.nombreCompleto)||'tu mascota'}. Puedes escribirle al veterinario.</p>
    </div>

    <div class="reg-vetcard">
      <div class="cn">${esc(record.vetNombre)||'Veterinario'}</div>
      <div class="cm">${esc(record.vetDireccion)||''}${record.vetTelefono? ' · '+esc(record.vetTelefono):''}</div>
      <div class="reg-vetacts">
        <a class="wa" target="_blank" href="https://wa.me/${telDigits}?text=${encodeURIComponent('Hola, quisiera solicitar una cita no urgente para '+(record.mascotas&&record.mascotas[0]&&record.mascotas[0].nombre?record.mascotas[0].nombre:'mi mascota')+'.')}">💬 WhatsApp</a>
      </div>
    </div>

    <button class="reg-edit" onclick="regEdit()">✏️ Editar registro</button>
  `;
}

function getProducts(){
  try{
    const savedVersion = localStorage.getItem(STORE_KEY+'_v');
    const saved = localStorage.getItem(STORE_KEY);
    if(saved && savedVersion === String(CATALOG_VERSION)) return JSON.parse(saved);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
}
function saveProducts(list){
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
  localStorage.setItem(STORE_KEY+'_v', String(CATALOG_VERSION));
}
function cleanStoreCart(){
  const ids = new Set(getProducts().map(p=>p.id));
  let changed = false;
  for(const id of Object.keys(storeCart)){
    if(!ids.has(id)){ delete storeCart[id]; changed = true; }
  }
  return changed;
}

// ---- Flipbook ----
let bookSupplier = 'solla';
let bookIndex = 0;
function openFoodBook(sup){
  bookSupplier = sup;
  bookIndex = 0;
  document.getElementById('storeCover').style.display = 'none';
  document.getElementById('storeBook').style.display = 'block';
  renderBookPage();
  window.scrollTo({top:0});
}
function closeFoodBook(){
  showStoreCover();
  window.scrollTo({top:0});
}
function bookItems(){
  return getProducts().filter(p=>p.sup===bookSupplier && p.food);
}
function renderBookPage(){
  const items = bookItems();
  const info = SUPPLIER_INFO[bookSupplier];
  if(items.length === 0){
    document.getElementById('bookPage').innerHTML = `<p style="color:#8CA3AD;font-size:13px">Todavía no hay productos cargados para ${esc2(info?info.name:'')}.</p>`;
    document.getElementById('bookIndicator').textContent = '';
    document.getElementById('bookPrevBtn').disabled = true;
    document.getElementById('bookNextBtn').disabled = true;
    return;
  }
  if(bookIndex >= items.length) bookIndex = items.length - 1;
  if(bookIndex < 0) bookIndex = 0;
  const p = items[bookIndex];
  const speciesLabel = p.sp === 'perro' ? '🐶 Perros' : '🐱 Gatos';
  document.getElementById('bookPage').innerHTML = `
    <div class="bp-pic">${p.e}</div>
    <div style="font-size:11px;font-weight:800;color:#8a5d10;letter-spacing:.04em;margin-bottom:6px">${speciesLabel} · ${esc2(info.name)}</div>
    <div class="bp-title">${esc2(p.n)}</div>
    <div class="bp-desc">${esc2(p.d)}</div>
    <div class="bp-price">${scop(p.price)}</div>
    <div class="bp-actions">
      <button class="bp-add" id="sbtn-${p.id}" onclick="storeAdd('${p.id}')">Agregar</button>
      <button class="bp-info" onclick="openNutri('${p.id}')">ℹ️ Información nutricional</button>
    </div>
  `;
  document.getElementById('bookIndicator').textContent = `${bookIndex+1} / ${items.length}`;
  document.getElementById('bookPrevBtn').disabled = bookIndex === 0;
  document.getElementById('bookNextBtn').disabled = bookIndex === items.length - 1;
}
function bookNext(){
  const items = bookItems();
  if(bookIndex < items.length - 1){ bookIndex++; renderBookPage(); }
}
function bookPrev(){
  if(bookIndex > 0){ bookIndex--; renderBookPage(); }
}

function setStoreTab(sp){
  storeTab = sp;
  document.getElementById('tab-perro').classList.toggle('sel', sp==='perro');
  document.getElementById('tab-gato').classList.toggle('sel', sp==='gato');
  renderStoreGrid();
}
function renderStoreGrid(){
  const items = getProducts().filter(p=>p.sp===storeTab && !p.food);
  document.getElementById('storeGrid').innerHTML = items.map(p=>`
    <div class="scard">
      <div class="pic">${p.e}</div>
      <div class="name">${esc2(p.n)}</div>
      <div class="desc">${esc2(p.d)}</div>
      <div class="price">${scop(p.price)}</div>
      <button id="sbtn-${p.id}" onclick="storeAdd('${p.id}')">Agregar</button>
    </div>`).join('') || '<p style="color:#8CA3AD;font-size:13px;grid-column:1/-1">No hay accesorios en esta categoría todavía.</p>';
}
function storeAdd(id){
  storeCart[id] = (storeCart[id]||0) + 1;
  const btn = document.getElementById('sbtn-'+id);
  if(btn){
    btn.textContent = '✓ Agregado';
    btn.classList.add('added');
    setTimeout(()=>{
      const b = document.getElementById('sbtn-'+id);
      if(b){ b.textContent='Agregar'; b.classList.remove('added'); }
    }, 900);
  }
  updateStoreCartBar();
}
function storeCartCount(){ return Object.values(storeCart).reduce((a,b)=>a+b,0); }
function storeCartTotal(){
  const products = getProducts();
  return Object.entries(storeCart).reduce((sum,[id,qty])=>{
    const p = products.find(x=>x.id===id);
    return sum + (p ? p.price*qty : 0);
  },0);
}
const IVA_RATE = 0.19;
function storeIVA(){ return Math.round(storeCartTotal()*IVA_RATE); }
function storeGrandTotal(){ return storeCartTotal() + storeIVA(); }
function updateStoreCartBar(){
  cleanStoreCart();
  document.getElementById('storeCartCount').textContent = storeCartCount();
  document.getElementById('storeCartTotal').textContent = scop(storeGrandTotal());
  document.getElementById('storeOpenCart').disabled = storeCartCount()===0;
}
function openStoreCart(){
  renderStoreCartSheet();
  document.getElementById('storeSheetOverlay').style.display='block';
  document.getElementById('storeSheet').style.display='block';
}
function closeStoreCart(){
  document.getElementById('storeSheetOverlay').style.display='none';
  document.getElementById('storeSheet').style.display='none';
}
function renderStoreCartSheet(){
  cleanStoreCart();
  const products = getProducts();
  const rows = Object.entries(storeCart).map(([id,qty])=>{
    const p = products.find(x=>x.id===id);
    if(!p) return '';
    return `<div class="srow"><span>${p.e} ${esc2(p.n)}</span>
      <span style="display:flex;align-items:center;gap:8px">
        <button onclick="storeDecrement('${id}')" style="width:26px;height:26px;border-radius:8px;background:#F2F4F3;font-weight:800">−</button>
        <span style="min-width:16px;text-align:center">${qty}</span>
        <button onclick="storeIncrement('${id}')" style="width:26px;height:26px;border-radius:8px;background:#F2F4F3;font-weight:800">+</button>
        <span style="min-width:70px;text-align:right">${scop(p.price*qty)}</span>
      </span></div>`;
  }).join('');
  document.getElementById('storeCartRows').innerHTML = rows || '<p style="color:#8CA3AD;font-size:13px">Tu carrito está vacío.</p>';
  const breakdown = storeCartCount() > 0 ? `
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:#5C7079;padding-top:8px">
      <span>Subtotal</span><span>${scop(storeCartTotal())}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:#5C7079;margin-bottom:4px">
      <span>IVA (19%)</span><span>${scop(storeIVA())}</span>
    </div>` : '';
  document.getElementById('storeBreakdown').innerHTML = breakdown;
  document.getElementById('storeSheetTotal').textContent = scop(storeGrandTotal());
  updateStoreCartBar();
}
function storeDecrement(id){
  if(!storeCart[id]) return;
  storeCart[id] -= 1;
  if(storeCart[id] <= 0) delete storeCart[id];
  updateStoreCartBar();
  renderStoreCartSheet();
}
function storeIncrement(id){
  storeCart[id] = (storeCart[id]||0) + 1;
  updateStoreCartBar();
  renderStoreCartSheet();
}
function storeRemove(id){
  delete storeCart[id];
  updateStoreCartBar();
  renderStoreCartSheet();
}
function storeCheckout(){
  cleanStoreCart();
  if(storeCartCount()===0){
    alert('Tu carrito está vacío o los productos ya no están disponibles.');
    renderStoreCartSheet();
    return;
  }
  const products = getProducts();
  const lines = Object.entries(storeCart).map(([id,qty])=>{
    const p = products.find(x=>x.id===id);
    if(!p) return null;
    return `${qty}x ${p.n} — ${scop(p.price*qty)}`;
  }).filter(Boolean).join('\n');
  const msg = `🐾 *PEDIDO — VerdeCasaBrands*\n\n${lines}\n\nSubtotal: ${scop(storeCartTotal())}\nIVA (19%): ${scop(storeIVA())}\nTotal: ${scop(storeGrandTotal())}\n\nPor favor confirmar disponibilidad y entrega.`;
  window.open(`https://wa.me/${STORE_WA}?text=${encodeURIComponent(msg)}`, '_blank');
}
